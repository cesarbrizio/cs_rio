name: Mobile Build

on:
  workflow_dispatch:
    inputs:
      profile:
        description: EAS profile
        required: true
        default: production
        type: choice
        options:
          - development
          - preview
          - production
      platform:
        description: Target platform
        required: true
        default: all
        type: choice
        options:
          - android
          - ios
          - all
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: npm

      - name: Install dependencies
        working-directory: .
        run: npm ci

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Resolve build parameters
        id: params
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "profile=${{ inputs.profile }}" >> "$GITHUB_OUTPUT"
            echo "platform=${{ inputs.platform }}" >> "$GITHUB_OUTPUT"
          else
            echo "profile=production" >> "$GITHUB_OUTPUT"
            echo "platform=all" >> "$GITHUB_OUTPUT"
          fi

      - name: Run EAS build
        run: |
          npx eas build \
            --non-interactive \
            --platform "${{ steps.params.outputs.platform }}" \
            --profile "${{ steps.params.outputs.profile }}"
